<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login HopeVet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <link rel="stylesheet" href="login.css">
    <script>
        // Checks if the theme saved in localStorage is "dark"
        if (localStorage.getItem('theme') === 'dark') {
            // Adds the 'dark-mode' class to HTML immediately
            document.documentElement.classList.add('dark-mode');
            // Marks the toggle as checked (checkbox)
            window.onload = function() {
                document.getElementById('alternador').checked = true;
            };
        } else {
            document.documentElement.classList.remove('dark-mode');
            window.onload = function() {
                document.getElementById('alternador').checked = false;
            }
        }
    </script>
    <script src="script.js" defer></script>
</head>

<body>
    <main class="container">
        <section class="container-box">

            <div class="container-box-header">
                <div class="back-to">
                    <a href="../index.html"><i id="logout" class="ri-logout-circle-line"></i></a>
                </div>

                <div class="toggle-div">
                    <label class="toggle">
                        <input class="toggle-checkbox" type="checkbox" id="alternador">
                        <div class="toggle-switch"></div>
                    </label>
                </div>
            </div>

            <div class="apresentacao">
                <h1 class="apresentacao-titulo">
                    <strong class="apresentacao-strong">Hope</strong>Vet
                </h1>
                <p class="apresentacao-desc">Simplifying your veterinary clinic's routine</p>
            </div>

            <h4 class="insert-type">Login</h4>

            <form id="loginForm">
                <label class="camp-name" for="email">Email</label>
                <input class="camp" id="loginEmail" type="email" placeholder="Enter your email address">

                <label class="camp-name" for="senha">Password</label>
                <input class="camp" id="loginSenha" type="password" placeholder="Enter your registered password">

                <button id="loginButton" class="btn-entrar" type="button">Login</button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById('loginButton').addEventListener('click', function() {
            const email = document.getElementById('loginEmail').value;
            const senha = document.getElementById('loginSenha').value;

            const userData = JSON.parse(localStorage.getItem('userData'));

            if (userData && userData.email === email && userData.senha === senha) {
                window.location.href = 'sistemas/visãogeral.html';
            } else {
                alert('Incorrect email or password.');
            }
        });
    </script>
</body>

</html>
