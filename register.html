<!doctype html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HopeVet Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <link rel="stylesheet" href="login.css">
    <script>
        // Checks if the theme saved in localStorage is "dark"
        if (localStorage.getItem('theme') === 'dark') {
            // Adds the 'dark-mode' class to HTML immediately
            document.documentElement.classList.add('dark-mode');
            // Marks the toggle as checked (checkbox)
            window.onload = function() {
                document.getElementById('alternador').checked = true;
            };
        } else {
            document.documentElement.classList.remove('dark-mode');
            window.onload = function() {
                document.getElementById('alternador').checked = false;
            }
        }
    </script>
    <script src="script.js" defer></script>
</head>

<body>
    <main class="container">
        <section class="container-box">

            <div class="container-box-header">
                <div class="back-to">
                    <a href="../index.html"><i id="logout" class="ri-logout-circle-line"></i></a>
                </div>

                <div class="toggle-div">
                    <label class="toggle">
                        <input class="toggle-checkbox" type="checkbox" id="alternador">
                        <div class="toggle-switch"></div>
                    </label>
                </div>
            </div>

            <div class="apresentacao">
                <h1 class="apresentacao-titulo">
                    <strong class="apresentacao-strong">Hope</strong>Vet
                </h1>
                <p class="apresentacao-desc">Simplifying your veterinary clinic's routine</p>
            </div>

            <h4 class="insert-type">Register</h4>

            <form id="registerForm">
                <label class="camp-name" for="nome">Name</label>
                <input class="camp" id="nome" type="text" placeholder="Enter the veterinary clinic name">

                <label class="camp-name" for="email">Email</label>
                <input class="camp" id="registerEmail" type="email" placeholder="Enter the email address">

                <label class="camp-name" for="telefone">Phone</label>
                <input class="camp" id="telefone" type="tel" placeholder="Enter the phone number">

                <label class="camp-name" for="endereco">Address</label>
                <input class="camp" id="endereco" type="text" placeholder="Enter the clinic address">

                <label class="camp-name" for="registerSenha">Password</label>
                <input class="camp" id="registerSenha" type="password" placeholder="Enter a password">

                <button id="registerButton" class="btn-entrar" type="button">Register</button>
            </form>
        </section>
    </main>

    <script>
        document.getElementById('registerButton').addEventListener('click', function() {
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('registerEmail').value;
            const telefone = document.getElementById('telefone').value;
            const endereco = document.getElementById('endereco').value;
            const senha = document.getElementById('registerSenha').value;

            const userData = {
                nome: nome,
                email: email,
                telefone: telefone,
                endereco: endereco,
                senha: senha
            };

            localStorage.setItem('userData', JSON.stringify(userData));
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
